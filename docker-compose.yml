services:

  db_volnateca:
    image: postgres:18
    container_name: volnateca-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres-data:/var/lib/postgresql

    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: volnateca-app
    restart: unless-stopped

    env_file:
      - .env

    environment:
      DB_HOST: db_volnateca

    ports:
      - "0.0.0.0:${APP_PORT:-8000}:8000"

    depends_on:
      db_volnateca:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres-data:
